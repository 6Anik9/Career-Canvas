<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CareerCanvas | Created by 6ANIK9</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --bg: #FDFCFB; 
            --charcoal: #2D2926; 
            --accent: #C5A059; 
            --border: #E5E5E5;
            --muted: #8C8C8C;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--charcoal); margin: 0; padding: 0; overflow-x: hidden; }

        /* --- LANDING SCREEN (Fixed GitHub Gap) --- */
        #welcomeScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--charcoal); color: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; text-align: center; padding: 20px;
        }
        .hero-title { font-family: 'Georgia', serif; font-size: 42px; letter-spacing: -1px; margin: 0; }
        .hero-sub { font-size: 10px; text-transform: uppercase; letter-spacing: 5px; color: var(--accent); margin-top: 15px; }
        
        .start-btn { 
            margin-top: 60px; padding: 16px 45px; border: 1px solid var(--accent); 
            background: transparent; color: var(--bg); cursor: pointer;
            font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2.5px;
            transition: 0.3s;
        }
        .start-btn:hover { background: var(--accent); color: var(--charcoal); }

        .welcome-footer { position: absolute; bottom: 40px; width: 100%; text-align: center; }
        .dev-by { font-size: 9px; text-transform: uppercase; letter-spacing: 3px; color: var(--muted); margin-bottom: 15px; }
        .welcome-socials a { color: var(--bg); font-size: 22px; margin: 0 15px; text-decoration: none; display: inline-block; }

        /* --- APP INTERFACE --- */
        .nav { display: flex; justify-content: center; gap: 30px; padding: 15px 0; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .nav-item { font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; }
        .nav-item.active { color: var(--charcoal); border-bottom-color: var(--charcoal); }

        .container { width: 100%; max-width: 650px; margin: 0 auto; padding: 20px 15px 120px 15px; }
        .hidden { display: none !important; }

        .field-group { margin-bottom: 20px; }
        label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); display: block; margin-bottom: 6px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; outline: none; background: #fff; }

        /* --- CV PREVIEW --- */
        .cv-inner { padding: 45px; border: 1px solid var(--border); background: #fff; position: relative; }
        .cv-header { text-align: center; margin-bottom: 25px; }
        .cv-photo { width: 110px; height: 110px; border: 1px solid var(--charcoal); object-fit: cover; margin-bottom: 15px; padding: 4px; }
        
        .contact-bar { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; font-size: 10px; color: var(--muted); margin: 15px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 10px 0; }

        .section-h { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 4px; margin-top: 25px; }
        .content { font-size: 12.5px; color: #333; white-space: pre-line; margin-bottom: 15px; line-height: 1.6; }

        .skill-container { margin-bottom: 12px; }
        .skill-info { display: flex; justify-content: space-between; font-size: 10px; font-weight: 700; margin-bottom: 4px; }
        .progress-bg { width: 100%; height: 6px; background: #eee; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--charcoal); width: 0%; transition: 1s ease-in-out; }

        .cv-bottom { margin-top: 50px; display: flex; justify-content: space-between; align-items: flex-end; }
        .sig-wrapper { text-align: center; width: 150px; border-top: 1px solid var(--charcoal); padding-top: 5px; font-size: 9px; font-weight: 800; text-transform: uppercase; }

        /* --- FOOTER ELEMENTS --- */
        .cv-footer-web { margin-top: 60px; text-align: center; border-top: 1px solid var(--border); padding-top: 20px; }
        .socials a { color: var(--charcoal); font-size: 18px; margin: 0 10px; text-decoration: none; }
        
        /* Hidden by default on web, shown on PDF */
        .pdf-only-credit { display: none; text-align: center; font-size: 9px; color: var(--muted); margin-top: 30px; letter-spacing: 1px; }

        .controls { position: fixed; bottom: 25px; right: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 1100; }
        .btn-round { background: var(--charcoal); color: var(--bg); width: 50px; height: 50px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        /* --- PRINT/PDF FIXES --- */
        @media print {
            #welcomeScreen, .nav, .controls, .form-view, .cv-footer-web { display: none !important; }
            .container { padding: 0; max-width: 100%; }
            .cv-inner { border: none; padding: 0; width: 100%; }
            .pdf-only-credit { display: block !important; } /* Shows simple credit on PDF */
            .progress-bg { -webkit-print-color-adjust: exact; background-color: #eee !important; }
            .progress-fill { -webkit-print-color-adjust: exact; background-color: #2D2926 !important; }
        }
    </style>
</head>
<body>

<div id="welcomeScreen">
    <h1 class="hero-title">Career <span style="font-weight:100; font-style:italic;">Canvas</span></h1>
    <p class="hero-sub">Minimalist CV Generator</p>
    
    <button class="start-btn" onclick="enterApp()">Get Started</button>

    <div class="welcome-footer">
        <div class="dev-by">Developed By</div>
        <div class="welcome-socials">
            <a href="https://github.com/6ANIK9" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://www.instagram.com/6mdaniksheikh9" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
    </div>
</div>

<div id="mainApp" class="hidden">
    <div class="nav">
        <div class="nav-item active" id="btnEdit" onclick="tab('edit')">Compose</div>
        <div class="nav-item" id="btnView" onclick="tab('view')">Preview</div>
    </div>

    <div class="container">
        <div id="editArea" class="form-view">
            <div class="field-group">
                <label>Profile Image</label>
                <input type="file" accept="image/*" onchange="updateImg(event)">
            </div>
            <div class="field-group">
                <label>Identity</label>
                <input type="text" id="iName" placeholder="Full Name" oninput="sync()">
                <input type="text" id="iTitle" placeholder="Professional Title" oninput="sync()" style="margin-top:8px">
            </div>
            <div class="field-group">
                <label>Contact</label>
                <input type="text" id="iPhone" placeholder="Phone" oninput="sync()">
                <input type="email" id="iEmail" placeholder="Email" oninput="sync()" style="margin-top:8px">
                <input type="text" id="iAddr" placeholder="Location" oninput="sync()" style="margin-top:8px">
            </div>
            <div class="field-group">
                <label>Background</label>
                <textarea id="iEdu" rows="3" placeholder="Education..." oninput="sync()"></textarea>
                <textarea id="iExp" rows="4" placeholder="Experience..." oninput="sync()" style="margin-top:8px"></textarea>
            </div>
            <div class="field-group">
                <label>Expertise (Skill:Value, Skill:Value)</label>
                <input type="text" id="iSkills" placeholder="HTML:90, UI:85" oninput="sync()">
            </div>
            <div class="field-group">
                <label>Verification</label>
                <textarea id="iRef" rows="2" placeholder="References..." oninput="sync()"></textarea>
            </div>
        </div>

        <div id="viewArea" class="hidden">
            <div id="captureArea" class="cv-inner">
                <div class="cv-header">
                    <img id="oImg" class="cv-photo" src="https://via.placeholder.com/150">
                    <h1 id="oName" style="font-family: Georgia, serif; font-size: 28px; margin: 0; text-transform: uppercase;">YOUR NAME</h1>
                    <div id="oTitle" style="font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-top: 5px; font-weight: 700;">DESIGNATION</div>
                    <div class="contact-bar">
                        <span id="oPhone"></span> <span id="oEmail"></span> <span id="oAddr"></span>
                    </div>
                </div>

                <div class="section"><div class="section-h">Education</div><div class="content" id="oEdu"></div></div>
                <div class="section"><div class="section-h">Experience</div><div class="content" id="oExp"></div></div>
                <div class="section"><div class="section-h">Skills</div><div id="skillBars"></div></div>
                <div class="section"><div class="section-h">References</div><div class="content" id="oRef"></div></div>

                <div class="cv-bottom">
                    <div style="font-size: 10px; color: var(--muted);">Dated: <span id="currentDate"></span></div>
                    <div class="sig-wrapper">Authorized Signature</div>
                </div>

                <div class="pdf-only-credit">CREDIT GOES TO 6ANIK9</div>

                <div class="cv-footer-web">
                    <div style="font-size: 9px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; color: var(--muted);">Developed by 6ANIK9</div>
                    <div class="socials">
                        <a href="https://github.com/6ANIK9" target="_blank"><i class="fab fa-github"></i></a>
                        <a href="https://www.instagram.com/6mdaniksheikh9" target="_blank"><i class="fab fa-instagram"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-round" style="background: var(--accent);" onclick="downloadImage()"><i class="fas fa-camera"></i></button>
        <button class="btn-round" onclick="window.print()"><i class="fas fa-file-pdf"></i></button>
    </div>
</div>

<script>
    function enterApp() {
        document.getElementById('welcomeScreen').style.display = 'none';
        document.getElementById('mainApp').classList.remove('hidden');
    }

    window.onload = () => { document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-GB'); };

    function tab(mode) {
        const isView = (mode === 'view');
        document.getElementById('editArea').classList.toggle('hidden', isView);
        document.getElementById('viewArea').classList.toggle('hidden', !isView);
        document.getElementById('btnView').classList.toggle('active', isView);
        document.getElementById('btnEdit').classList.toggle('active', !isView);
        if(isView) {
            setTimeout(() => { 
                document.querySelectorAll('.progress-fill').forEach(bar => {
                    bar.style.width = bar.dataset.percent + "%";
                });
            }, 100);
        }
    }

    function sync() {
        document.getElementById('oName').innerText = document.getElementById('iName').value.toUpperCase() || "YOUR NAME";
        document.getElementById('oTitle').innerText = document.getElementById('iTitle').value.toUpperCase() || "DESIGNATION";
        document.getElementById('oPhone').innerText = document.getElementById('iPhone').value;
        document.getElementById('oEmail').innerText = document.getElementById('iEmail').value;
        document.getElementById('oAddr').innerText = document.getElementById('iAddr').value;
        document.getElementById('oEdu').innerText = document.getElementById('iEdu').value;
        document.getElementById('oExp').innerText = document.getElementById('iExp').value;
        document.getElementById('oRef').innerText = document.getElementById('iRef').value;
        
        const skillStr = document.getElementById('iSkills').value;
        const container = document.getElementById('skillBars');
        container.innerHTML = "";
        if(skillStr) {
            skillStr.split(',').forEach(item => {
                const p = item.split(':');
                if(p.length === 2) {
                    container.innerHTML += `<div class="skill-container"><div class="skill-info"><span>${p[0].trim()}</span><span>${p[1].trim()}%</span></div><div class="progress-bg"><div class="progress-fill" data-percent="${p[1].trim()}"></div></div></div>`;
                }
            });
        }
    }

    function updateImg(e) { if(e.target.files[0]) document.getElementById('oImg').src = URL.createObjectURL(e.target.files[0]); }

    function downloadImage() {
        tab('view');
        setTimeout(() => {
            html2canvas(document.getElementById('captureArea'), { scale: 3, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'CareerCanvas_6ANIK9.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }, 500);
    }
</script>
</body>
</html>
